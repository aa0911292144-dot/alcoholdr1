<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcohol Dr. 酒精博士 | 專為品酒者設計的極致修復</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-black: #0A0A0A;
            --text-gray: #A0A0A0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-gold); border-radius: 10px; }

        /* 背景流光效果 */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* 導覽列 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary-gold);
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Hero 視覺區 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards 0.5s;
        }

        .hero p {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--text-gray);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s forwards 0.8s;
        }

        /* 按鈕設計 */
        .cta-button {
            padding: 15px 45px;
            border: 1px solid var(--primary-gold);
            background: transparent;
            color: var(--primary-gold);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 3px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            background: var(--primary-gold);
            color: black;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        /* 產品特色卡片區 */
        .features {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass-bg);
            padding: 50px 40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            background: rgba(255,255,255,0.08);
        }

        .card i {
            font-size: 2.5rem;
            color: var(--primary-gold);
            margin-bottom: 25px;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .card p {
            color: var(--text-gray);
            font-size: 0.95rem;
            line-height: 2;
        }

        /* 裝飾性小特效 */
        .accent-line {
            width: 50px;
            height: 2px;
            background: var(--primary-gold);
            margin: 20px 0;
        }

        /* 動畫 */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 回應式優化 */
        @media (max-width: 768px) {
            nav { padding: 20px; }
            .hero h1 { letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav>
        <div class="logo">ALCOHOL DR.</div>
        <a href="#explore" class="cta-button" style="padding: 10px 25px; font-size: 0.7rem;">聯繫我們</a>
    </nav>

    <section class="hero">
        <p>RECOVERY & SCIENCE</p>
        <h1>酒精博士</h1>
        <p>為每一場深夜的歡愉，提供科學的救贖</p>
        <div class="accent-line"></div>
        <a href="#features" class="cta-button">探索奧秘</a>
    </section>

    <section class="features" id="features">
        <div class="card">
            <i class="fa-solid fa-flask-vial"></i>
            <h3>精準配方</h3>
            <div class="accent-line"></div>
            <p>融合現代生物科技，針對酒精代謝過程提供精準支持。這不僅是補充，更是一場體內的微米級修復工程。</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-shield-halved"></i>
            <h3>極致防禦</h3>
            <div class="accent-line"></div>
            <p>在應酬與聚會之間，為您的身體築起一道透明的防護牆，讓隔日的早晨依然如晨曦般清亮。</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-leaf"></i>
            <h3>純粹萃取</h3>
            <div class="accent-line"></div>
            <p>拒絕多餘添加。我們只保留大自然中最純淨的修復能量，轉化為您應對挑戰的底氣。</p>
        </div>
    </section>

    <footer style="padding: 50px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
        <p style="font-size: 0.8rem; color: #555; letter-spacing: 2px;">&copy; 2026 ALCOHOL DR. 酒精博士 - 全台首席飲酒對策</p>
    </footer>

    <script>
        // 簡單的滾動視差與淡入效果
        window.addEventListener('scroll', () => {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top;
                if (cardTop < window.innerHeight * 0.8) {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }
            });
        });

        // 初始化卡片狀態
        document.querySelectorAll('.card').forEach(c => {
            c.style.opacity = '0';
            c.style.transform = 'translateY(50px)';
            c.style.transition = 'all 0.8s ease-out';
        });
    </script>
</body>
</html>
